<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <defs>
    <linearGradient id="bar1" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#1E3A8A"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#0D9488"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#0F766E"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="5" flood-color="#000000" flood-opacity="0.15"/>
    </filter>

    <filter id="cyan-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <style>
      /* Smooth pulsing growth for the bars */
      .bar {
        transform-box: fill-box;
        transform-origin: bottom;
      }
      .bar1 { animation: gentleRise 2.5s cubic-bezier(0.4, 0, 0.2, 1) infinite alternate; }
      .bar2 { animation: gentleRise 2.5s cubic-bezier(0.4, 0, 0.2, 1) infinite alternate 0.4s; }
      .bar3 { animation: gentleRise 2.5s cubic-bezier(0.4, 0, 0.2, 1) infinite alternate 0.8s; }

      @keyframes gentleRise {
        0% { transform: scaleY(0.85); }
        100% { transform: scaleY(1.05); }
      }

      /* Drawing animation for the connecting AI line */
      .line {
        stroke-dasharray: 120;
        stroke-dashoffset: 120;
        animation: drawLine 3s ease-in-out infinite alternate;
      }

      @keyframes drawLine {
        0% { stroke-dashoffset: 120; }
        100% { stroke-dashoffset: 0; }
      }

      /* Glowing pulse for the data nodes */
      .dot {
        animation: pulseNode 1.5s ease-in-out infinite alternate;
      }

      @keyframes pulseNode {
        0% { r: 3px; opacity: 0.7; }
        100% { r: 4.5px; opacity: 1; }
      }
    </style>
  </defs>

  <rect width="200" height="200" fill="transparent" />

  <g transform="translate(15, 15)">
    <rect x="40" y="90" width="26" height="60" rx="13" fill="url(#bar1)" class="bar bar1" filter="url(#shadow)"/>
    <rect x="80" y="50" width="26" height="100" rx="13" fill="url(#bar2)" class="bar bar2" filter="url(#shadow)"/>
    <rect x="120" y="10" width="26" height="140" rx="13" fill="url(#bar3)" class="bar bar3" filter="url(#shadow)"/>

    <path d="M 53 105 C 73 105, 73 65, 93 65 C 113 65, 113 25, 133 25" 
          fill="none" stroke="#22D3EE" stroke-width="2.5" 
          stroke-linecap="round" class="line" filter="url(#cyan-glow)"/>

    <circle cx="53" cy="105" fill="#67E8F9" class="dot" filter="url(#cyan-glow)"/>
    <circle cx="93" cy="65" fill="#67E8F9" class="dot" filter="url(#cyan-glow)" style="animation-delay: 0.4s;"/>
    <circle cx="133" cy="25" fill="#67E8F9" class="dot" filter="url(#cyan-glow)" style="animation-delay: 0.8s;"/>
  </g>
</svg>
